query_id: 13
title: Intl Roaming SMS (MO)
collection: '{{request_log}}'
pipeline:
- $match:
    rat_type:
      $in:
      - SM
    service_type_sub_cd: MO
    req_time:
      $gte:
        $dateVar: start_date
      $lt:
        $dateVar: end_date_exclusive
    roaming_destination_id:
      $ne: 87
- $group:
    _id:
      rat_type: $rat_type
    rat_type:
      $first: $rat_type
    total_transaction:
      $sum: 1
    mou_raw:
      $sum:
        $round:
        - $update_used_volume
        - 2
- $project:
    _id: 0
    rat_type: 1
    total_transaction: 1
    mou:
      $round:
      - $mou_raw
      - 2
