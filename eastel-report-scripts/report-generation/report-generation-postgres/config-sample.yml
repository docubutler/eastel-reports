# PostgreSQL connection settings.
# You can also provide these with environment variables:
# - POSTGRES_DSN
# - PGHOST
# - PGPORT
# - PGDATABASE
# - PGUSER
# - PGPASSWORD
# - PGSSLMODE
postgres:
  dsn: ""
  host: "localhost"
  port: 5432
  database: "anchor_iot"
  user: "your_user"
  password: "your_password"
  sslmode: "disable"

# Report generation paths and output behavior.
report_generation:
  source_queries_file: "queries.sql"
  split_queries_dir: "generated-queries"
  template_csv: "report-template.csv"
  output_csv: "report-output.csv"
  query_column_name: "Query"
  default_table: "iot_portal_tb_request_log"

tables:
  request_log_table: "iot_portal_tb_request_log"

variables:
  start_date: "2026-01-01"
  end_date: "2026-01-01"
